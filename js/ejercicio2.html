<script>
    class Tamagotchi{
        constructor(nombre){
            this.nombre = nombre;
            this.hambre = 10;
        }
        comer(){
            this.hambre -= 2;
        }
    }
    var tamagotchi1 = new Tamagotchi("Mametchi");
    tamagotchi1.comer();
    console.log("Tamagotchi: " + tamagotchi1.nombre + " - Hambre: " + tamagotchi1.hambre);
</script>
