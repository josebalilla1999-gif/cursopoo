<script>
    class RangeException extends RangeError{
        constructor(message){
            super(message);
            this.name = "RangeException";
        }
    }
    class ValidadorSensor{
        static analizarTemperatura(grados){
            if(grados < -50 || grados > 100){
                throw new RangeException("La temperatura está fuera del rango permitido.");
            }
            console.log("Temperatura válida: " + grados + "°C");
        }
    }
    try{
        ValidadorSensor.analizarTemperatura(25);
        ValidadorSensor.analizarTemperatura(-60);
    }catch(e){
        if(e instanceof RangeException){
            console.error("Error: " + e.message);
        }else{
            throw e;
        }
    }
</script>
