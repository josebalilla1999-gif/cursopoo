<script>
    class Cuenta{
        nombre;
        saldo = 0;
        constructor(nombre){
            this.nombre = nombre;
        }
        ingresar(cantidad){
            this.saldo += cantidad;
        }
        retirar(cantidad){
            if(cantidad > this.saldo){
                console.log("No se puede retirar esa cantidad. Saldo insuficiente.");
            } else {
                this.saldo -= cantidad;
            }
        }
    }
</script>
