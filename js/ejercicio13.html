<script>
    class Tarea{
        #titulo = "";
        completada = false;
    }
    class GestorTareas extends Tarea{
        #lista = [];
        agregarTarea(tarea){
            this.#lista.push(tarea);
        }
        listarPendientes(){
            this.#lista.forEach((tarea, i) => {
                if(!tarea.completada){
                    console.log('Tarea ' + (i + 1) + ': Pendiente');
                }
            });
        }
    }
</script>
