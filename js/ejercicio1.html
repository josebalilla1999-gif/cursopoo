<script>
    class Jugador{
        constructor(nombre){
            this.nombre = nombre;
            this.vidas = 3;
        }
        oneup(){
            this.vidas += 1;
        }
        hit(){
            this.vidas -= 1;
        }
        mushroom(){
            this.vidas += 2;
        }
        tinymushroom(){
            this.vidas = 1;
        }
        poisonmushroom(){
            this.vidas = 0;
        }
        reset(){
            this.vidas = 3;
        }
    }
    var jugador1 = new Jugador("Mario");
    var jugador2 = new Jugador("Luigi");
    console.log("Jugador 1: " + jugador1.nombre + " - Vidas: " + jugador1.vidas);
    console.log("Jugador 2: " + jugador2.nombre + " - Vidas: " + jugador2.vidas);
</script>
