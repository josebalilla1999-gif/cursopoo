<script>
    class Vehiculo{
        marca;
        arrancar(){
            console.log("El vehículo " + this.marca + " ha arrancado.");
        }
    }
    class CocheElectrico extends Vehiculo{
        autonomia = 400;
        constructor(marca){
            super();
            this.marca = marca;
        }
        arrancar(){
            if(this.autonomia <= 0){
                console.log("No se puede arrancar el coche eléctrico " + this.marca + ". Batería descargada.");
                return;
            }else{
                this.autonomia -= 50;
                console.log("El coche eléctrico " + this.marca + " ha arrancado silenciosamente.");
            }
        }
        cargar(){
            if(this.autonomia >= 400){
                console.log("El coche eléctrico " + this.marca + " ya está completamente cargado.");
                return;
            }else{
                do{
                    console.log("Cargando el coche eléctrico " + this.marca);
                    this.autonomia += 50;
                    console.log("Lleva " + this.autonomia + " km de autonomía.");
                }while(this.autonomia < 400);
                console.log("El coche eléctrico " + this.marca + " ha terminado de cargar.");
            }
        }
    }
</script>
</html>
